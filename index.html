function getZodiac(birthday) {
  if (!birthday) return null;
  const d = new Date(birthday);
  const m = d.getMonth() + 1, day = d.getDate();
  for (const z of ZODIAC_DATA) {
    const [sm,sd]=z.start, [em,ed]=z.end;
    if (sm<=em) { if ((m===sm&&day>=sd)||(m===em&&day<=ed)||(m>sm&&m<em)) return z; }
    else { if ((m===sm&&day>=sd)||(m===em&&day<=ed)||m>sm||m<em) return z; }
  }
  return ZODIAC_DATA[0];
}

// ── MBTI 궁합 ──
const MBTI_COMPAT = {
  ideal: [["INFP","ENFJ"],["ENFP","INFJ"],["INFJ","ENFP"],["ENFJ","INFP"],["INTP","ENTJ"],["ENTP","INTJ"],["INTJ","ENTP"],["ENTJ","INTP"],["ISFP","ESFJ"],["ESFP","ISFJ"],["ISFJ","ESFP"],["ESFJ","ISFP"],["ISTP","ESTJ"],["ESTP","ISTJ"],["ISTJ","ESTP"],["ESTJ","ISTP"]],
  good: [["INFP","INTJ"],["INFP","INFJ"],["ENFP","ENFJ"],["ENFP","ENTJ"],["INTP","ENTP"],["INTP","INFJ"],["ENTP","INFJ"],["ENTJ","ENFJ"],["ISFP","ISFJ"],["ESFP","ESFJ"],["ISTP","ISTJ"],["ESTP","ESTJ"],["INTJ","INFJ"],["INFJ","ENFJ"],["ISTJ","ISFJ"],["ESTJ","ESFJ"]],
};

function mbtiSingle(a,b) {
  if (!a||!b) return 50;
  for (const [x,y] of MBTI_COMPAT.ideal) if ((a===x&&b===y)||(a===y&&b===x)) return 95;
  for (const [x,y] of MBTI_COMPAT.good) if ((a===x&&b===y)||(a===y&&b===x)) return 80;
  return 40+[0,1,2,3].filter(i=>a[i]===b[i]).length*10;
}

function getMbtiScore(p1,p2) {
  const s11=mbtiSingle(p1.mbti1,p2.mbti1), s12=mbtiSingle(p1.mbti1,p2.mbti2);
  const s21=mbtiSingle(p1.mbti2,p2.mbti1), s22=mbtiSingle(p1.mbti2,p2.mbti2);
  const h1=!!p1.mbti2, h2=!!p2.mbti2;
  if (h1&&h2) return Math.round(s11*.55+s12*.15+s21*.15+s22*.15);
  if (h1) return Math.round(s11*.7+s21*.3);
  if (h2) return Math.round(s11*.7+s12*.3);
  return s11;
}

// ── 에니어그램 궁합 ──
const ENNE_IDEAL=[[2,8],[1,7],[4,5],[3,6],[2,9],[1,2],[5,8],[4,9],[6,9],[3,7],[1,9],[7,9]];
function enneSingle(a,b) {
  if (!a||!b) return 50;
  for (const [x,y] of ENNE_IDEAL) if ((a===x&&b===y)||(a===y&&b===x)) return 92;
  const d=Math.abs(a-b);
  if (d===0) return 78; if (d===1||d===8) return 72; if (d<=2||d>=7) return 65; return 55;
}
function getEnneScore(p1,p2) {
  const s11=enneSingle(p1.enne1,p2.enne1), s12=enneSingle(p1.enne1,p2.enne2);
  const s21=enneSingle(p1.enne2,p2.enne1), s22=enneSingle(p1.enne2,p2.enne2);
  const h1=!!p1.enne2, h2=!!p2.enne2;
  if (h1&&h2) return Math.round(s11*.55+s12*.15+s21*.15+s22*.15);
  if (h1) return Math.round(s11*.7+s21*.3);
  if (h2) return Math.round(s11*.7+s12*.3);
  return s11;
}

// ── 혈액형 / 별자리 / 직업 궁합 ──
const BLOOD_MAP={"O-A":92,"A-O":92,"A-AB":85,"AB-A":85,"O-B":80,"B-O":80,"B-AB":82,"AB-B":82,"O-O":88,"A-A":78,"B-B":72,"AB-AB":70,"O-AB":75,"AB-O":75,"A-B":60,"B-A":60};
function getBloodScore(a,b) { return BLOOD_MAP[`${a}-${b}`]||65; }

function getZodiacScore(a,b) {
  if (!a||!b) return 50;
  const ce={fire:["fire","air"],air:["air","fire"],water:["water","earth"],earth:["earth","water"]};
  if (a.name===b.name) return 80;
  if (ce[a.element]?.includes(b.element)) return 88;
  return 55;
}

function getJobScore(a,b) {
  if (!a||!b) return 70;
  if (a.trim().toLowerCase()===b.trim().toLowerCase()) return 90;
  // seeded pseudo-random based on strings
  const h=(a+b).split("").reduce((s,c)=>s+c.charCodeAt(0),0);
  return 60+(h%26);
}

// ── 관계 유형별 가중치 ──
const WEIGHTS = {
  love:     { mbti:.30, enne:.20, blood:.15, zodiac:.20, job:.15 },
  marriage: { mbti:.25, enne:.25, blood:.15, zodiac:.15, job:.20 },
  friend:   { mbti:.30, enne:.25, blood:.10, zodiac:.15, job:.20 },
  work:     { mbti:.25, enne:.20, blood:.05, zodiac:.10, job:.40 },
};

function calcPairScores(p1,p2) {
  return {
    mbti: getMbtiScore(p1,p2),
    enne: getEnneScore(p1,p2),
    blood: getBloodScore(p1.blood,p2.blood),
    zodiac: getZodiacScore(getZodiac(p1.birthday),getZodiac(p2.birthday)),
    job: getJobScore(p1.job,p2.job),
  };
}

function totalFromScores(scores, relType) {
  const w = WEIGHTS[relType];
  return Math.round(scores.mbti*w.mbti + scores.enne*w.enne + scores.blood*w.blood + scores.zodiac*w.zodiac + scores.job*w.job);
}

// ── MBTI 축 차이 분석 헬퍼 ──
function mbtiDiffAxis(a, b) {
  // 두 MBTI에서 다른 축을 분석 (E/I, S/N, T/F, J/P)
  const axes = ["E/I","S/N","T/F","J/P"];
  const diffs = [];
  for (let i = 0; i < 4; i++) { if (a[i] !== b[i]) diffs.push({ axis: axes[i], from: a[i], to: b[i] }); }
  return diffs;
}

// ── 이상형 제안 (1명 모드) — 통합 인물상 추천 ──
function getIdealProfile(person, relType) {
  const m1 = person.mbti1;
  const m2 = person.mbti2;
  const e1 = person.enne1;
  const e2 = person.enne2;
  const myM1 = MBTI_DESC[m1] || MBTI_DESC.ENFP;
  const myM2 = m2 ? MBTI_DESC[m2] : null;
  const myE1 = ENNE_DESC[e1] || ENNE_DESC[9];
  const myE2 = e2 ? ENNE_DESC[e2] : null;

  // ── 나의 통합 성격 분석 ──
  let myBlend = `${myM1.traits} ${m1}(${myM1.nick})`;
  let mySwingAxis = null;
  if (m2) {
    const diffs = mbtiDiffAxis(m1, m2);
    if (diffs.length > 0) {
      mySwingAxis = diffs[0]; // 가장 첫 번째 다른 축
      const desc = AXIS_DETAIL[`${mySwingAxis.from}-${mySwingAxis.to}`] || "";
      myBlend = `기본적으로 ${myM1.traits} ${m1}(${myM1.nick})이지만, ${AXIS_NAMES[mySwingAxis.to]}(${mySwingAxis.to}) 성향도 강해 ${desc} 복합적인 성격`;
    }
  }

  // ── MBTI 이상형: 통합된 한 사람 ──
  const mbtiIdealMap = {};
  for (const [a,b] of MBTI_COMPAT.ideal) { mbtiIdealMap[a]=b; mbtiIdealMap[b]=a; }
  const mbtiGoodMap = {};
  for (const [a,b] of MBTI_COMPAT.good) { if (!mbtiGoodMap[a]) mbtiGoodMap[a]=b; if (!mbtiGoodMap[b]) mbtiGoodMap[b]=a; }

  const idealM1 = mbtiIdealMap[m1] || "ENFP";
  // 2순위의 ideal을 이상형의 "서브 성향"으로 — m2의 ideal이 1순위와 다르면 사용
  let idealM2 = null;
  if (m2) {
    const m2ideal = mbtiIdealMap[m2];
    if (m2ideal && m2ideal !== idealM1) idealM2 = m2ideal;
    else {
      const m2good = mbtiGoodMap[m2];
      if (m2good && m2good !== idealM1) idealM2 = m2good;
    }
  }
  if (!idealM2) {
    const fallback = mbtiGoodMap[m1];
    if (fallback && fallback !== idealM1) idealM2 = fallback;
  }
  const iM1 = MBTI_DESC[idealM1] || MBTI_DESC.ENFP;
  const iM2 = idealM2 ? MBTI_DESC[idealM2] : null;

  // 이상형 축 차이 분석 (이상형 1순위와 2순위 사이)
  let idealSwingDesc = "";
  if (idealM2) {
    const iDiffs = mbtiDiffAxis(idealM1, idealM2);
    if (iDiffs.length > 0) {
      const d = iDiffs[0];
      idealSwingDesc = `${AXIS_NAMES[d.to]}(${d.to}) 적 성향도 살짝 가지고 있는`;
    }
  }

  // ── 에니어그램 이상형: 통합된 한 사람 ──
  const enneIdealMap = {};
  const enneGoodMap = {};
  for (const [a,b] of ENNE_IDEAL) {
    if (!enneIdealMap[a]) enneIdealMap[a]=b;
    if (!enneIdealMap[b]) enneIdealMap[b]=a;
    if (!enneGoodMap[a]) enneGoodMap[a]=[]; enneGoodMap[a].push(b);
    if (!enneGoodMap[b]) enneGoodMap[b]=[]; enneGoodMap[b].push(a);
  }
  const idealE1 = enneIdealMap[e1] || 9;
  let idealE2 = null;
  if (e2) {
    const e2ideal = enneIdealMap[e2];
    if (e2ideal && e2ideal !== idealE1) idealE2 = e2ideal;
    else idealE2 = (enneGoodMap[e2]||[]).find(x => x !== idealE1) || null;
  }
  if (!idealE2) idealE2 = (enneGoodMap[e1]||[]).find(x => x !== idealE1) || null;
  const iE1 = ENNE_DESC[idealE1] || ENNE_DESC[9];
  const iE2 = idealE2 ? ENNE_DESC[idealE2] : null;

  // ── 혈액형 / 별자리 ──
  const bloodIdealMap = { A:"O", B:"AB", O:"A", AB:"A" };
  const idealBlood = bloodIdealMap[person.blood] || "O";
  const z = getZodiac(person.birthday);
  const elementCompat = { fire:"air", air:"fire", water:"earth", earth:"water" };
  const elementNames = { fire:"불", air:"바람", water:"물", earth:"흙" };
  const idealElement = z ? elementCompat[z.element] : "fire";
  const idealZodiacs = ZODIAC_DATA.filter(zd => zd.element === idealElement);

  // ── 이상형 직업 추천 (1순위 + 2순위 기반 블렌딩) ──
  const j1 = (IDEAL_JOBS[idealM1] || IDEAL_JOBS.ENFP)[relType] || [];
  const j2 = idealM2 ? ((IDEAL_JOBS[idealM2] || {})[relType] || []) : [];
  // 블렌딩: 1순위에서 7개 + 2순위에서 겹치지 않는 3개
  const seen = new Set();
  const idealJobs = [];
  for (const j of j1) { if (idealJobs.length < 7 && !seen.has(j)) { idealJobs.push(j); seen.add(j); } }
  for (const j of j2) { if (idealJobs.length < 10 && !seen.has(j)) { idealJobs.push(j); seen.add(j); } }
  while (idealJobs.length < 10 && j1.length > idealJobs.length) {
    const j = j1[idealJobs.length]; if (!seen.has(j)) { idealJobs.push(j); seen.add(j); }
    else break;
  }

  // ── 통합 인물상 서술 ──
  const relCtx = { love:"연인", marriage:"배우자", friend:"친구", work:"동료" }[relType] || "파트너";

  // 이상형을 하나의 인격체로 묘사
  let idealPersona = `${idealM1}(${iM1.nick})`;
  if (idealM2 && iM2) {
    idealPersona += `이면서 ${idealM2}(${iM2.nick}) 성향도 함께 가진 분`;
  }
  let idealEnnePersona = `에니어그램 ${idealE1}번(${iE1.nick})`;
  if (idealE2 && iE2) {
    idealEnnePersona += `을 주유형으로, ${idealE2}번(${iE2.nick}) 날개를 가진 분`;
  }

  // ── 상세 분석 이유 생성 ──
  const reasons = [];

  // 1. 나의 통합 성격 프로파일
  reasons.push({
    icon: "🔍",
    title: "당신은 이런 사람입니다",
    detail: m2
      ? `${myBlend}의 소유자입니다. ${m1}의 핵심 기능(${myM1.func})을 기반으로 하되, ${m2} 모드가 켜질 때는 ${myM2?.traits || ""} 면이 드러납니다. 이런 '${AXIS_NAMES[mySwingAxis?.from]}-${AXIS_NAMES[mySwingAxis?.to]}' 스윙은 당신을 다면적이고 매력적인 사람으로 만들지만, 동시에 이 양면을 모두 이해해줄 수 있는 특별한 파트너가 필요합니다.${myE2 ? ` 에니어그램에서도 ${e1}번(${myE1.nick})의 '${myE1.drive}'를 추구하면서 ${e2}번(${myE2.nick})의 '${myE2.core}'하는 성향이 교차하고 있어요.` : ` 에니어그램 ${e1}번(${myE1.nick})으로서 '${myE1.drive}'를 핵심 동기로 삼고 있습니다.`}`
      : `${myM1.traits} ${m1}(${myM1.nick})으로서, 인지 기능 ${myM1.func}을 중심으로 세상을 바라봅니다. '${myM1.shadow}' 영역이 상대적으로 약한 편이에요. 에니어그램 ${e1}번(${myE1.nick})으로서 '${myE1.drive}'를 핵심 동기로, '${myE1.fear}'을 가장 두려워합니다.${myE2 ? ` ${e2}번(${myE2.nick}) 날개의 영향으로 '${myE2.core}'하는 면도 가지고 있어요.` : ""}`,
  });

  // 2. 이상형 통합 인물상
  reasons.push({
    icon: "💫",
    title: `당신의 이상적인 ${relCtx}: ${idealPersona}`,
    detail: m2 && idealM2 && iM2
      ? `당신의 ${m1} 면에는 ${idealM1}(${iM1.nick})의 ${iM1.traits} 에너지가 완벽하게 맞물리고, ${m2} 면에는 ${idealM2}(${iM2.nick})의 ${iM2.traits} 특성이 호응합니다. 즉, 기본적으로 ${iM1.nick}이지만 ${idealSwingDesc || `${iM2.nick}적 유연함도 가진`} 사람이야말로 당신의 양면을 모두 포용하는 ${relCtx}이에요. 이런 사람 옆에서는 어떤 모드의 당신이든 "나답게" 있을 수 있습니다.`
      : `${iM1.traits} ${idealM1}(${iM1.nick})은 당신의 인지 기능(${myM1.func})과 자연스럽게 맞물리는 유형입니다. 특히 당신이 약한 '${myM1.shadow}' 영역을 상대가 강점으로 가지고 있어, 함께 있으면 한 단계 더 성장하는 느낌을 받게 됩니다.`,
  });

  // 3. 에니어그램 통합 분석
  reasons.push({
    icon: "💎",
    title: `내면의 궁합: ${idealEnnePersona}`,
    detail: e2 && idealE2 && iE2
      ? `당신의 핵심 동기 '${myE1.drive}'(${e1}번)와 서브 동기 '${myE2.core}'(${e2}번)를 동시에 충족시킬 수 있는 사람은, ${idealE1}번(${iE1.nick})의 '${iE1.core}'를 기반으로 하면서 ${idealE2}번(${iE2.nick})의 '${iE2.drive}' 에너지도 가진 사람입니다. 이 조합은 당신이 '${myE1.fear}'에 빠질 때 ${iE1.nick}의 힘으로 끌어올려주고, 동시에 ${iE2.nick}의 따뜻함으로 안전하게 감싸주는 이상적인 밸런스예요.`
      : `당신의 핵심 동기는 '${myE1.drive}'이고 가장 두려워하는 것은 '${myE1.fear}'입니다. ${idealE1}번(${iE1.nick})은 '${iE1.core}' 유형으로, 당신이 두려움에 빠질 때 자연스럽게 균형을 잡아줍니다. ${relCtx}으로서 서로의 핵심 욕구를 채워주는 보완적 관계예요.`,
  });

  // 4. 혈액형 분석
  const bloodReasons = {
    "A-O": "꼼꼼하고 신중한 A형인 당신에게 O형은 대범하고 결단력 있는 에너지를 불어넣어 줍니다. 당신이 고민에 빠질 때 '괜찮아, 해보자!'라고 손 내밀어주는 사람이에요.",
    "B-AB": "자유롭고 창의적인 B형인 당신에게 AB형은 논리와 감성을 동시에 이해하는 희소한 존재입니다. 당신의 기발함을 존중하면서도 방향성을 잡아줘요.",
    "O-A": "리더십 있고 목표 지향적인 O형인 당신에게 A형은 세심한 디테일과 안정감을 선사합니다. 큰 그림을 그리는 당신의 뒤에서 완벽하게 마무리해주는 파트너예요.",
    "AB-A": "독특하고 다면적인 AB형인 당신에게 A형은 일관된 따뜻함과 신뢰를 줍니다. 복잡한 내면을 가진 당신을 판단 없이 받아들여주는 안식처 같은 존재예요.",
    "O-B": "목표 지향적인 O형인 당신에게 B형은 예측 불가능한 창의적 자극을 줍니다. 틀에 박히지 않는 B형의 시선이 당신에게 새로운 영감을 가져다줘요.",
    "B-O": "자유분방한 B형인 당신에게 O형은 든든한 버팀목이 됩니다. 당신이 자유롭게 날아다닐 때 안전한 착지점이 되어주는 사람이에요.",
    "A-AB": "세심한 A형인 당신에게 AB형은 다양한 관점과 지적 자극을 줍니다. 당신의 깊이에 넓이를 더해주는 파트너예요.",
    "AB-O": "다면적인 AB형인 당신에게 O형은 명쾌한 방향성과 행동력을 줍니다. 당신의 복잡한 생각을 실행으로 옮기도록 도와주는 사람이에요.",
  };
  reasons.push({
    icon: "🩸",
    title: `${person.blood}형 × ${idealBlood}형: 혈액형 골든 매치`,
    detail: bloodReasons[`${person.blood}-${idealBlood}`] || `${person.blood}형의 특성을 가장 잘 보완하는 혈액형은 ${idealBlood}형입니다. 서로의 생활 리듬과 스트레스 해소 방식이 자연스럽게 맞아떨어지는 조합이에요.`,
  });

  // 5. 별자리 분석
  if (z) {
    reasons.push({
      icon: "⭐",
      title: `${z.icon} ${z.name}(${elementNames[z.element]}) × ${elementNames[idealElement]} 원소: 운명적 시너지`,
      detail: `${z.name}의 '${elementNames[z.element]}' 에너지는 '${elementNames[idealElement]}' 원소와 만날 때 가장 강력한 시너지를 발휘합니다. ${idealZodiacs.map(zz=>`${zz.icon}${zz.name}`).join(", ")} 별자리의 사람과 함께하면 서로의 에너지가 증폭되어 자연스러운 끌림이 생겨요.`,
    });
  }

  // 6. 종합 인물상 요약
  reasons.push({
    icon: "🎯",
    title: "종합: 이런 한 사람을 찾으세요",
    detail: `정리하면, 당신의 이상적인 ${relCtx}은 「${idealM1}(${iM1.nick})${idealM2 ? `이면서 ${idealM2} 성향도 살짝 있고` : "의 성격에"}, 에니어그램 ${idealE1}번(${iE1.nick})${idealE2 ? `에 ${idealE2}번(${iE2.nick}) 날개를 가졌으며` : "이고"}, ${idealBlood}형, ${idealZodiacs.length > 0 ? idealZodiacs.slice(0,2).map(zz=>`${zz.icon}${zz.name}`).join(" 또는 ") : ""}」인 분입니다. 이 조합이야말로 당신의 모든 면 — ${m1}일 때도${m2 ? `, ${m2}일 때도` : ""}, ${e1}번의 동기가 강할 때도${e2 ? `, ${e2}번의 면이 나올 때도` : ""} — 을 통째로 이해하고 사랑해줄 수 있는 단 하나의 인물상이에요.`,
  });

  return {
    mbti1: idealM1, mbti2: idealM2,
    mbti1Info: iM1, mbti2Info: iM2,
    enne1: idealE1, enne2: idealE2,
    enne1Info: iE1, enne2Info: iE2,
    blood: idealBlood, zodiacs: idealZodiacs, idealElement, elementNames,
    idealJobs, reasons, idealPersona, idealEnnePersona,
    myBlend,
  };
}

// ── 직업 자동완성 입력 컴포넌트 ──
function JobInput({ value, onChange, style: outerStyle }) {
  const [query, setQuery] = useState(value);
  const [open, setOpen] = useState(false);
  const [highlighted, setHighlighted] = useState(-1);
  const wrapRef = useRef(null);

  // 외부 value 변경 시 동기화 (초기화 등)
  const prevVal = useRef(value);
  if (value !== prevVal.current) {
    prevVal.current = value;
    if (value === "" && query !== "") {
      setTimeout(() => setQuery(""), 0);
    }
  }

  const filtered = query.trim()
    ? JOB_LIST.filter(j => j.toLowerCase().includes(query.trim().toLowerCase())).slice(0, 8)
    : [];

  const handleInput = (e) => {
    const v = e.target.value;
    setQuery(v);
    onChange(v);
    setOpen(true);
    setHighlighted(-1);
  };

  const select = (job) => {
    setQuery(job);
    onChange(job);
    setOpen(false);
  };

  const handleKeyDown = (e) => {
    if (!open || !filtered.length) return;
    if (e.key === "ArrowDown") { e.preventDefault(); setHighlighted(h => Math.min(h+1, filtered.length-1)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setHighlighted(h => Math.max(h-1, 0)); }
    else if (e.key === "Enter" && highlighted >= 0) { e.preventDefault(); select(filtered[highlighted]); }
    else if (e.key === "Escape") { setOpen(false); }
  };

  const handleBlur = () => { setTimeout(() => setOpen(false), 150); };

  return (
    <div ref={wrapRef} style={{ position:"relative" }}>
      <input
        type="text"
        placeholder="예: 개발자, 디자이너, 의사..."
        style={outerStyle}
        value={query}
        onChange={handleInput}
        onFocus={() => { if (query.trim()) setOpen(true); }}
        onBlur={handleBlur}
        onKeyDown={handleKeyDown}
      />
      {open && filtered.length > 0 && (
        <div style={{
          position:"absolute", top:"100%", left:0, right:0, zIndex:50, marginTop:"4px",
          background:"rgba(20,20,40,0.97)", border:"1px solid rgba(255,255,255,0.12)",
          borderRadius:"10px", overflow:"hidden", boxShadow:"0 8px 32px rgba(0,0,0,0.4)",
          maxHeight:"220px", overflowY:"auto",
        }}>
          {filtered.map((job, i) => (
            <div
              key={job}
              onMouseDown={() => select(job)}
              style={{
                padding:"10px 14px", cursor:"pointer", fontSize:"13px",
                background: i === highlighted ? "rgba(124,58,237,0.2)" : "transparent",
                color: i === highlighted ? "#a78bfa" : "#cbd5e1",
                borderBottom: i < filtered.length-1 ? "1px solid rgba(255,255,255,0.05)" : "none",
              }}
            >
              {job}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── 커스텀 생년월일 입력 컴포넌트 ──
function BirthdayInput({ value, onChange, style: outerStyle }) {
  // value는 "YYYY-MM-DD" 형태 (내부 데이터), 표시는 "YYYY. MM. DD"
  const toDisplay = (isoVal) => {
    if (!isoVal) return "";
    const nums = isoVal.replace(/\D/g, "");
    if (nums.length <= 4) return nums;
    if (nums.length <= 6) return `${nums.slice(0,4)}. ${nums.slice(4)}`;
    return `${nums.slice(0,4)}. ${nums.slice(4,6)}. ${nums.slice(6,8)}`;
  };

  const toIso = (nums) => {
    if (nums.length >= 8) return `${nums.slice(0,4)}-${nums.slice(4,6)}-${nums.slice(6,8)}`;
    return "";
  };

  const [display, setDisplay] = useState(toDisplay(value));

  const handleChange = (e) => {
    let raw = e.target.value.replace(/\D/g, "").slice(0, 8);
    let formatted = "";
    if (raw.length <= 4) formatted = raw;
    else if (raw.length <= 6) formatted = `${raw.slice(0,4)}. ${raw.slice(4)}`;
    else formatted = `${raw.slice(0,4)}. ${raw.slice(4,6)}. ${raw.slice(6)}`;
    setDisplay(formatted);
    if (raw.length === 8) {
      const iso = toIso(raw);
      // 간단한 유효성 검사
      const m = parseInt(raw.slice(4,6)), d = parseInt(raw.slice(6,8));
      if (m >= 1 && m <= 12 && d >= 1 && d <= 31) {
        onChange(iso);
      }
    } else {
      onChange("");
    }
  };

  // value가 외부에서 변경될 때 동기화 (초기화 등)
  const prevVal = useRef(value);
  if (value !== prevVal.current) {
    prevVal.current = value;
    if (value === "" && display !== "") {
      setTimeout(() => setDisplay(""), 0);
    }
  }

  return (
    <input
      type="text"
      inputMode="numeric"
      placeholder="19850321"
      style={outerStyle}
      value={display}
      onChange={handleChange}
    />
  );
}

            )}
          </div>
          {/* 에니어그램 이상형 — 통합 표시 */}
          <div style={{ marginBottom:"16px" }}>
            <div style={{ fontSize:"11px", color:"#64748b", marginBottom:"6px" }}>에니어그램 — 내면의 구조</div>
            <div style={{ display:"flex", alignItems:"center", gap:"8px", flexWrap:"wrap" }}>
              <span style={{ fontSize:"24px", fontWeight:"700", color:"#60a5fa" }}>{ideal.enne1}번</span>
              <span style={{ fontSize:"13px", color:"#94a3b8" }}>({ideal.enne1Info.nick})</span>
              {ideal.enne2 && ideal.enne2Info && (
                <>
                  <span style={{ fontSize:"13px", color:"#475569" }}>+ 날개</span>
                  <span style={{ fontSize:"18px", fontWeight:"600", color:"#4a7fbd" }}>{ideal.enne2}번</span>
                  <span style={{ fontSize:"12px", color:"#64748b" }}>({ideal.enne2Info.nick})</span>
                </>
              )}
            </div>
            {ideal.enne2 && ideal.enne2Info && (
              <div style={{ fontSize:"11px", color:"#64748b", marginTop:"6px", fontStyle:"italic", lineHeight:"1.5" }}>
                '{ideal.enne1Info.core}'를 기반으로 '{ideal.enne2Info.drive}'의 에너지도 함께 가진 사람
              </div>
            )}
          </div>
          {/* 혈액형 & 별자리 */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"16px" }}>
            <div>
              <div style={{ fontSize:"11px", color:"#64748b", marginBottom:"4px" }}>이상적 혈액형</div>
              <div style={{ fontSize:"24px", fontWeight:"700", color:"#f472b6" }}>{ideal.blood}형</div>
            </div>
            <div>
              <div style={{ fontSize:"11px", color:"#64748b", marginBottom:"4px" }}>이상적 별자리 ({ideal.elementNames[ideal.idealElement]} 원소)</div>
              <div style={{ fontSize:"14px", fontWeight:"600", color:"#34d399", lineHeight:"1.6" }}>
                {ideal.zodiacs.map(z=>`${z.icon}${z.name}`).join(", ")}
              </div>
            </div>
          </div>
        </div>

        {/* 나의 프로필 요약 */}
        <div style={{ marginTop:"16px" }}>
          <ProfileSummary person={person} label="나의 프로필" accent="#94a3b8" />
        </div>
      </div>

      {/* 상세 분석 이유 */}
      <div style={S.card}>
        <div style={{...S.label, color:"#a78bfa"}}>왜 이 조합이 최고인가요?</div>
        {ideal.reasons.map((r, i) => (
          <div key={i} style={{ background:"rgba(255,255,255,0.03)", borderRadius:"12px", padding:"16px", marginBottom:"12px", textAlign:"left" }}>
            <div style={{ fontSize:"15px", fontWeight:"700", color:"#e2e8f0", marginBottom:"8px" }}>
              {r.icon} {r.title}
            </div>
            <div style={{ fontSize:"13px", color:"#94a3b8", lineHeight:"1.7" }}>
              {r.detail}
            </div>
          </div>
        ))}
      </div>

      {/* 이상형 추천 직업 */}
      <div style={S.card}>
        <div style={{...S.label, color:"#fbbf24"}}>이런 직업을 가진 사람을 만나보세요</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px" }}>
          {ideal.idealJobs.map((job, i) => (
            <div key={i} style={{
              background: i < 3 ? "rgba(251,191,36,0.08)" : "rgba(255,255,255,0.03)",
              border: i < 3 ? "1px solid rgba(251,191,36,0.2)" : "1px solid rgba(255,255,255,0.05)",
              borderRadius:"10px", padding:"10px 14px", textAlign:"left",
              display:"flex", alignItems:"center", gap:"8px",
            }}>
              <span style={{ fontSize:"12px", color: i<3 ? "#fbbf24" : "#64748b", fontWeight:"700", minWidth:"20px" }}>{i+1}</span>
              <span style={{ fontSize:"13px", color: i<3 ? "#fbbf24" : "#94a3b8", fontWeight: i<3 ? "600" : "400" }}>{job}</span>
            </div>
          ))}
        </div>
        <div style={{ fontSize:"11px", color:"#475569", marginTop:"10px", textAlign:"left", fontStyle:"italic" }}>
          * 상위 3개는 당신의 MBTI·에니어그램 조합과 특히 시너지가 높은 직업이에요
        </div>
      </div>

      {/* 버튼 */}
      <div style={{ display:"flex", justifyContent:"center", flexWrap:"wrap", gap:"8px" }}>
        <button style={S.btnSm} onClick={onRetry}>정보 유지하고 다시 보기</button>
        <button style={S.btnGhost} onClick={onClear}>초기화하고 새로 하기</button>
      </div>
    </div>
  );
}

// ── 페어 궁합 결과 카드 ──
function PairCard({ p1, p2, i1, i2, scores, relType }) {
  const total = totalFromScores(scores, relType);
  const comment = getComment(total, relType);
  const m1 = MBTI_DESC[p1.mbti1], m2 = MBTI_DESC[p2.mbti1];
  const l1 = `P${i1+1} ${p1.mbti1}${p1.mbti2?`/${p1.mbti2}`:""}`;
  const l2 = `P${i2+1} ${p2.mbti1}${p2.mbti2?`/${p2.mbti2}`:""}`;

  return (
    <div style={{ ...S.card, padding:"20px" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"12px" }}>
        <div style={{ fontSize:"13px", color:"#94a3b8" }}>{l1} × {l2}</div>
        <div style={{ fontSize:"11px", color:comment.color }}>{comment.emoji} {comment.title}</div>
      </div>
      <div style={{ display:"flex", alignItems:"baseline", gap:"8px", marginBottom:"12px" }}>
        <div style={{ fontSize:"40px", fontWeight:"800", background:`linear-gradient(135deg,${comment.color},#60a5fa)`, WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>{total}</div>
        <div style={{ fontSize:"12px", color:"#64748b" }}>/ 100</div>
      </div>
      <div style={{ display:"flex", gap:"6px", flexWrap:"wrap" }}>
        {[
          { l:"MBTI", v:scores.mbti, c:"#a78bfa" },
          { l:"에니어", v:scores.enne, c:"#60a5fa" },
          { l:"혈액형", v:scores.blood, c:"#f472b6" },
          { l:"별자리", v:scores.zodiac, c:"#34d399" },
          { l:"직업", v:scores.job, c:"#fbbf24" },
        ].map(d => (
          <div key={d.l} style={{ background:"rgba(255,255,255,0.04)", borderRadius:"8px", padding:"6px 10px", textAlign:"center" }}>
            <div style={{ fontSize:"10px", color:"#64748b" }}>{d.l}</div>
            <div style={{ fontSize:"16px", fontWeight:"700", color:d.c }}>{d.v}</div>
          </div>
        ))}
      </div>
      {/* 양쪽 프로필 요약 */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px", marginTop:"10px", fontSize:"10px", color:"#64748b" }}>
        <div>
          <span style={{color:"#94a3b8",fontWeight:"600"}}>P{i1+1}</span> {p1.mbti1}{p1.mbti2?`/${p1.mbti2}`:""} · E{p1.enne1}{p1.enne2?`w${p1.enne2}`:""} · {p1.blood}형
        </div>
        <div>
          <span style={{color:"#94a3b8",fontWeight:"600"}}>P{i2+1}</span> {p2.mbti1}{p2.mbti2?`/${p2.mbti2}`:""} · E{p2.enne1}{p2.enne2?`w${p2.enne2}`:""} · {p2.blood}형
        </div>
      </div>
    </div>
  );
}

// ── 다중 궁합 결과 (2명+) ──
function MultiResult({ people, relType, onRetry, onClear }) {
  // 모든 페어 계산
  const pairs = [];
  for (let i=0; i<people.length; i++) {
    for (let j=i+1; j<people.length; j++) {
      const scores = calcPairScores(people[i], people[j]);
      const total = totalFromScores(scores, relType);
      pairs.push({ i, j, scores, total });
    }
  }
  pairs.sort((a,b) => b.total - a.total);

  const best = pairs[0];
  const bestComment = getComment(best.total, relType);
  const bestStrengths = getStrengths(best.scores);
  const bestCautions = getCautions(best.scores);

  const chartData = [
    { subject:"MBTI", value:best.scores.mbti },
    { subject:"에니어그램", value:best.scores.enne },
    { subject:"혈액형", value:best.scores.blood },
    { subject:"별자리", value:best.scores.zodiac },
    { subject:"직업", value:best.scores.job },
  ];

  const relLabel = RELATION_TYPES.find(r=>r.key===relType)?.label||"궁합";

  const handleShare = async () => {
    let text = `💫 ${relLabel} 테스트 결과! (${people.length}명)\n\n`;
    text += `🏆 최고 궁합: P${best.i+1}(${people[best.i].mbti1}) × P${best.j+1}(${people[best.j].mbti1}) = ${best.total}점\n`;
    text += `${bestComment.emoji} ${bestComment.title}\n\n`;
    pairs.forEach((p,idx) => {
      text += `${idx+1}. P${p.i+1} × P${p.j+1}: ${p.total}점\n`;
    });
    if (navigator.share) {
      try { await navigator.share({ title:`${relLabel} 테스트 결과`, text }); } catch{}
    } else {
      await navigator.clipboard.writeText(text);
      alert("결과가 클립보드에 복사되었습니다!");
    }
  };

  return (
    <div style={{ textAlign:"center", marginTop:"32px" }}>
      {/* 베스트 궁합 */}
      <div style={{...S.card, padding:"36px 28px"}}>
        <div style={{ fontSize:"12px", color:"#64748b", marginBottom:"4px" }}>{relLabel} · {people.length}명 분석</div>
        <div style={{ fontSize:"14px", color:"#94a3b8", marginBottom:"12px" }}>
          🏆 최고 궁합: P{best.i+1}({people[best.i].mbti1}{people[best.i].mbti2?`/${people[best.i].mbti2}`:""}) × P{best.j+1}({people[best.j].mbti1}{people[best.j].mbti2?`/${people[best.j].mbti2}`:""})
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px", marginBottom:"16px" }}>
          <ProfileSummary person={people[best.i]} label={`P${best.i+1}`} accent="#a78bfa" />
          <ProfileSummary person={people[best.j]} label={`P${best.j+1}`} accent="#60a5fa" />
        </div>
        <div style={{...S.totalScore, background:`linear-gradient(135deg,${bestComment.color},#60a5fa)`, WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>
          {best.total}
        </div>
        <div style={{ fontSize:"14px", color:"#94a3b8", marginTop:"4px" }}>최고 궁합 점수</div>

        <div style={{ padding:"24px", borderRadius:"14px", marginTop:"20px", textAlign:"center", background:`${bestComment.color}15`, border:`1px solid ${bestComment.color}30` }}>
          <div style={{ fontSize:"32px", marginBottom:"8px" }}>{bestComment.emoji}</div>
          <div style={{ fontSize:"20px", fontWeight:"700", color:bestComment.color, marginBottom:"8px" }}>{bestComment.title}</div>
          <div style={{ fontSize:"14px", color:"#cbd5e1", lineHeight:"1.6" }}>{bestComment.desc}</div>
        </div>

        <div style={{ marginTop:"24px", display:"flex", justifyContent:"center" }}>
          <ResponsiveContainer width={320} height={260}>
            <RadarChart data={chartData} cx="50%" cy="50%" outerRadius="70%">
              <PolarGrid stroke="rgba(255,255,255,0.08)"/>
              <PolarAngleAxis dataKey="subject" tick={{fill:"#94a3b8",fontSize:12}}/>
              <PolarRadiusAxis angle={90} domain={[0,100]} tick={false} axisLine={false}/>
              <Radar dataKey="value" stroke="#7c3aed" fill="#7c3aed" fillOpacity={0.25} strokeWidth={2}/>
            </RadarChart>
          </ResponsiveContainer>
        </div>

        <div style={S.detailGrid}>
          {[{l:"MBTI",v:best.scores.mbti,c:"#a78bfa"},{l:"에니어그램",v:best.scores.enne,c:"#60a5fa"},{l:"혈액형",v:best.scores.blood,c:"#f472b6"},{l:"별자리",v:best.scores.zodiac,c:"#34d399"}].map(d=>(
            <div key={d.l} style={S.detailCard}>
              <div style={{fontSize:"12px",color:"#94a3b8",marginBottom:"4px"}}>{d.l}</div>
              <div style={{fontSize:"28px",fontWeight:"700",color:d.c}}>{d.v}</div>
            </div>
          ))}
        </div>
      </div>

      {/* 베스트 궁합 강점/주의 */}
      <div style={S.card}>
        <div style={{...S.label,color:"#34d399"}}>최고 궁합 강점</div>
        {bestStrengths.map((s,i)=><div key={i} style={S.listItem}>✦ {s}</div>)}
        <div style={{...S.label,color:"#f87171",marginTop:"20px"}}>주의할 점</div>
        {bestCautions.map((c,i)=><div key={i} style={S.listItem}>▸ {c}</div>)}
      </div>

      {/* 전체 페어 랭킹 */}
      {pairs.length > 1 && (
        <div style={S.card}>
          <div style={S.label}>전체 궁합 랭킹</div>
          {pairs.map((p, idx) => (
            <PairCard key={`${p.i}-${p.j}`} p1={people[p.i]} p2={people[p.j]} i1={p.i} i2={p.j} scores={p.scores} relType={relType} />
          ))}
        </div>
      )}

      <div style={{ display:"flex", justifyContent:"center", flexWrap:"wrap", gap:"8px" }}>
        <button style={S.btnSm} onClick={handleShare}>공유하기</button>
        <button style={S.btnSm} onClick={onRetry}>정보 유지하고 다시 보기</button>
        <button style={S.btnGhost} onClick={onClear}>초기화하고 새로 하기</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
// 메인 앱
// ══════════════════════════════════════════════════════

const EMPTY = { gender:"", mbti1:"", mbti2:"", enne1:"", enne2:"", blood:"", birthday:"", job:"" };

function App() {
  const [relType, setRelType] = useState("love");
  const [count, setCount] = useState(2);
  const [people, setPeople] = useState(Array.from({length:8}, ()=>({...EMPTY})));
  const [result, setResult] = useState(null); // null | "ideal" | "multi"

  const updatePerson = (idx, data) => {
    const next = [...people];
    next[idx] = data;
    setPeople(next);
  };

  const activePeople = people.slice(0, count);
  const canSubmit = activePeople.every(p => p.mbti1 && p.enne1 && p.blood && p.birthday);

  const calculate = () => {
    if (count === 1) setResult("ideal");
    else setResult("multi");
  };

  // 정보 유지하고 입력 화면으로 돌아가기
  const retry = () => {
    setResult(null);
  };

  // 전부 초기화
  const clearAll = () => {
    setPeople(Array.from({length:8}, ()=>({...EMPTY})));
    setResult(null);
  };

  const handleCountChange = (n) => {
    setCount(n);
    setResult(null);
  };

  return (
    <div style={S.app}>
      <div style={S.wrap}>
        <div style={S.hdr}>
          <h1 style={S.title}>궁합 테스트</h1>
          <p style={S.sub}>MBTI · 에니어그램 · 혈액형 · 별자리 · 직업</p>
        </div>

        {!result ? (
          <>
            <RelationPicker value={relType} onChange={setRelType} />
            <CountPicker count={count} onChange={handleCountChange} />

            {activePeople.map((p, i) => (
              <PersonForm key={i} index={i} data={p} onChange={d => updatePerson(i, d)} />
            ))}

            <button
              style={{...S.btn, opacity:canSubmit?1:0.4, cursor:canSubmit?"pointer":"not-allowed"}}
              onClick={canSubmit ? calculate : undefined}
            >
              {count === 1 ? "이상형 분석하기" : "궁합 보기"}
            </button>
          </>
        ) : result === "ideal" ? (
          <IdealResult person={activePeople[0]} relType={relType} onRetry={retry} onClear={clearAll} />
        ) : (
          <MultiResult people={activePeople} relType={relType} onRetry={retry} onClear={clearAll} />
        )}

        <div style={S.footer}>본 결과는 재미를 위한 것이며 과학적 근거가 없습니다</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
